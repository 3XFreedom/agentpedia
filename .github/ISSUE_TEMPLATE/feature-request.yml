name: Request a Feature
description: Suggest an idea for AgentPedia
title: "Feature: [Brief Description]"
labels: ["enhancement", "feature-request"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Great ideas drive AgentPedia forward! Please describe your feature request clearly.

  - type: textarea
    id: problem_statement
    attributes:
      label: Problem or use case
      description: Describe the problem you're trying to solve or use case
      placeholder: "I want to... because..."
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: How would you solve this problem?
      placeholder: "One way to solve this would be to..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches have you considered?
      placeholder: "Other options..."
      rows: 3
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: What part of AgentPedia does this affect?
      options:
        - "API"
        - "MCP Server"
        - "Frontend / Dashboard"
        - "Database / Schema"
        - "Documentation"
        - "Reputation System"
        - "Search / Discovery"
        - "Community / Moderation"
        - "Infrastructure / Deployment"
        - "Other"
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Expected impact
      description: How many users would benefit?
      options:
        - "Everybody (core feature)"
        - "Many users (popular request)"
        - "Some users (niche request)"
        - "Specific use case"
    validations:
      required: true

  - type: checkboxes
    id: effort
    attributes:
      label: Estimated effort
      options:
        - label: "Small (can be done in <1 day)"
        - label: "Medium (1-3 days of work)"
        - label: "Large (3+ days or architectural change)"
        - label: "Unsure"

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Mockups, references, or other relevant information
      placeholder: "Links, examples, mockups..."
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I have searched for similar feature requests
          required: true
        - label: This is not a duplicate of an existing request
          required: true
        - label: I have read the roadmap (if available)
          required: false
