<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Submit your AI agent, tool, API, or framework to AgentPedia - the knowledge base built for AI agents.">
    <title>Submit an Agent - AgentPedia</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='24' font-size='24' fill='%2306b6d4'>P</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #09090b; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-up { animation: fadeUp 0.5s ease-out forwards; }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); } 50% { box-shadow: 0 0 20px 4px rgba(6, 182, 212, 0.15); } }
        .submit-glow:focus-within { animation: pulse-glow 2s ease-in-out infinite; }
        @keyframes checkmark { from { stroke-dashoffset: 50; } to { stroke-dashoffset: 0; } }
        .checkmark-animate { stroke-dasharray: 50; animation: checkmark 0.5s ease-out forwards; }
        @keyframes confetti { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(-100px) rotate(720deg); opacity: 0; } }
        .confetti-piece { animation: confetti 1s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root" class="min-h-screen bg-slate-950 text-slate-50"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = 'https://mcgnqvqswdjzoxauanzf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jZ25xdnFzd2Rqem94YXVhbnpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDQ3MDcsImV4cCI6MjA5MDM4MDcwN30.hXhFkCPpNT8mBMovRgSp8M2bP9WaBH7LbH23wWt0guw';

        const CATEGORIES = [
            { value: 'ai_agent', label: 'AI Agent', desc: 'Autonomous AI system that can take actions' },
            { value: 'api', label: 'API', desc: 'Programmatic interface for AI capabilities' },
            { value: 'framework', label: 'Framework', desc: 'Development framework for building AI apps' },
            { value: 'tool', label: 'Tool', desc: 'Utility or tool for AI development' },
            { value: 'protocol', label: 'Protocol', desc: 'Standard or protocol for AI communication' },
        ];

        const AUTH_TYPES = ['api_key', 'oauth2', 'bearer_token', 'none', 'custom'];

        function Nav() {
            return (
                <nav className="sticky top-0 z-50 bg-slate-950/95 backdrop-blur border-b border-slate-800">
                    <div className="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                        <a href="/" className="text-2xl font-bold text-cyan-400 hover:text-cyan-300 transition">AgentPedia</a>
                        <div className="space-x-6 hidden md:flex">
                            <a href="/agents" className="hover:text-cyan-400 transition font-semibold">Agents</a>
                            <a href="/shield" className="hover:text-cyan-400 transition font-semibold">Shield</a>
                            <a href="/submit" className="text-cyan-400 font-semibold">Submit</a>
                            <a href="https://github.com/3xfreedom/agentpedia" className="hover:text-cyan-400 transition">GitHub</a>
                        </div>
                    </div>
                </nav>
            );
        }

        function SuccessScreen({ agentName, onReset }) {
            return (
                <div className="text-center py-20 fade-up">
                    <div className="relative inline-block mb-8">
                        <div className="w-24 h-24 bg-emerald-500/20 rounded-full flex items-center justify-center mx-auto">
                            <svg className="w-12 h-12 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="3">
                                <path className="checkmark-animate" strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
                            </svg>
                        </div>
                        {[...Array(8)].map((_, i) => (
                            <div key={i} className="confetti-piece absolute w-2 h-2 rounded-full" style={{
                                background: ['#06b6d4', '#8b5cf6', '#f59e0b', '#ef4444', '#22c55e', '#ec4899', '#3b82f6', '#f97316'][i],
                                top: '50%', left: '50%',
                                transform: `translate(${Math.cos(i * 45 * Math.PI / 180) * 60}px, ${Math.sin(i * 45 * Math.PI / 180) * 60}px)`,
                                animationDelay: `${i * 0.05}s`
                            }} />
                        ))}
                    </div>
                    <h2 className="text-3xl font-bold mb-4">{agentName} Submitted!</h2>
                    <p className="text-slate-400 text-lg mb-2">Your submission is now pending review by the community.</p>
                    <p className="text-slate-500 mb-8">We'll review it shortly and add it to the directory.</p>
                    <div className="space-x-4">
                        <a href="/agents" className="inline-block bg-cyan-500 hover:bg-cyan-400 text-slate-950 px-8 py-3 rounded-lg font-semibold transition">Browse Agents</a>
                        <button onClick={onReset} className="inline-block border border-slate-600 hover:border-cyan-400 px-8 py-3 rounded-lg font-semibold transition">Submit Another</button>
                    </div>
                </div>
            );
        }

        function SubmitForm() {
            const [step, setStep] = useState(1);
            const [submitting, setSubmitting] = useState(false);
            const [submitted, setSubmitted] = useState(false);
            const [error, setError] = useState('');
            const formRef = useRef(null);

            const [form, setForm] = useState({
                name: '', slug: '', category: '', short_description: '', long_description: '',
                creator: '', website: '', logo_url: '', api_base_url: '', api_docs_url: '',
                auth_type: '', capabilities: '', tags: '',
                pricing_free_tier: '', pricing_paid_plans: '', pricing_usage_based: false,
                submitter_email: '', submitter_name: ''
            });

            const update = (field, value) => {
                setForm(f => ({ ...f, [field]: value }));
                if (field === 'name' && !form.slug) {
                    setForm(f => ({ ...f, [field]: value, slug: value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') }));
                }
            };

            const canAdvance = () => {
                if (step === 1) return form.name && form.category && form.short_description;
                if (step === 2) return true;
                if (step === 3) return form.submitter_email;
                return true;
            };

            const handleSubmit = async () => {
                setSubmitting(true);
                setError('');
                try {
                    const capsArray = form.capabilities ? form.capabilities.split(',').map(s => s.trim()).filter(Boolean) : [];
                    const tagsArray = form.tags ? form.tags.split(',').map(s => s.trim()).filter(Boolean) : [];
                    const pricing = {};
                    if (form.pricing_free_tier) pricing.free_tier = form.pricing_free_tier;
                    if (form.pricing_paid_plans) pricing.paid_plans = form.pricing_paid_plans;
                    if (form.pricing_usage_based) pricing.usage_based = true;

                    const payload = {
                        name: form.name,
                        slug: form.slug || form.name.toLowerCase().replace(/[^a-z0-9]+/g, '-'),
                        category: form.category,
                        short_description: form.short_description,
                        long_description: form.long_description || null,
                        creator: form.creator || form.submitter_name || null,
                        creator_email: form.submitter_email,
                        website: form.website || null,
                        api_base_url: form.api_base_url || null,
                        api_docs_url: form.api_docs_url || null,
                        auth_type: form.auth_type || 'none',
                        capabilities: capsArray,
                        tags: tagsArray,
                        pricing: Object.keys(pricing).length ? pricing : {}
                        // status defaults to 'pending' in DB
                    };

                    const res = await fetch(`${SUPABASE_URL}/rest/v1/submissions`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=representation'
                        },
                        body: JSON.stringify(payload)
                    });

                    if (!res.ok) {
                        const errData = await res.json().catch(() => ({}));
                        throw new Error(errData.message || errData.msg || `Submission failed (${res.status})`);
                    }

                    setSubmitted(true);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setSubmitting(false);
                }
            };

            if (submitted) {
                return <SuccessScreen agentName={form.name} onReset={() => { setSubmitted(false); setStep(1); setForm({ name: '', slug: '', category: '', short_description: '', long_description: '', creator: '', website: '', logo_url: '', api_base_url: '', api_docs_url: '', auth_type: '', capabilities: '', tags: '', pricing_free_tier: '', pricing_paid_plans: '', pricing_usage_based: false, submitter_email: '', submitter_name: '' }); }} />;
            }

            return (
                <div className="fade-up" ref={formRef}>
                    {/* Progress bar */}
                    <div className="flex items-center justify-center mb-12 gap-2">
                        {[1, 2, 3].map(s => (
                            <React.Fragment key={s}>
                                <button onClick={() => s < step && setStep(s)}
                                    className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm transition-all duration-300 ${
                                        s === step ? 'bg-cyan-500 text-white scale-110 shadow-lg shadow-cyan-500/30' :
                                        s < step ? 'bg-cyan-500/20 text-cyan-400 cursor-pointer hover:bg-cyan-500/30' :
                                        'bg-slate-800 text-slate-500'
                                    }`}>
                                    {s < step ? '✓' : s}
                                </button>
                                {s < 3 && <div className={`w-16 h-0.5 transition-all duration-300 ${s < step ? 'bg-cyan-500' : 'bg-slate-700'}`} />}
                            </React.Fragment>
                        ))}
                    </div>
                    <div className="flex justify-center mb-6 text-sm text-slate-400 gap-8">
                        <span className={step === 1 ? 'text-cyan-400 font-semibold' : ''}>Basics</span>
                        <span className={step === 2 ? 'text-cyan-400 font-semibold' : ''}>Details</span>
                        <span className={step === 3 ? 'text-cyan-400 font-semibold' : ''}>Review</span>
                    </div>

                    {/* Step 1: Basics */}
                    {step === 1 && (
                        <div className="space-y-6 fade-up">
                            <div className="submit-glow rounded-lg">
                                <label className="block text-sm font-medium text-slate-300 mb-2">Agent/Tool Name *</label>
                                <input type="text" value={form.name} onChange={e => update('name', e.target.value)}
                                    placeholder="e.g. Claude, LangChain, Stripe API"
                                    className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 transition" />
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-slate-300 mb-2">URL Slug</label>
                                <div className="flex items-center bg-slate-800 border border-slate-700 rounded-lg overflow-hidden">
                                    <span className="px-4 py-3 text-slate-500 text-sm bg-slate-800/50 border-r border-slate-700">agentpedia.io/agents/</span>
                                    <input type="text" value={form.slug} onChange={e => update('slug', e.target.value)}
                                        placeholder="auto-generated"
                                        className="flex-1 bg-transparent px-4 py-3 text-white placeholder-slate-500 focus:outline-none" />
                                </div>
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-slate-300 mb-3">Category *</label>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                                    {CATEGORIES.map(cat => (
                                        <button key={cat.value} onClick={() => update('category', cat.value)}
                                            className={`text-left p-4 rounded-lg border transition-all duration-200 ${
                                                form.category === cat.value
                                                    ? 'border-cyan-500 bg-cyan-500/10 shadow-lg shadow-cyan-500/10'
                                                    : 'border-slate-700 bg-slate-800/50 hover:border-slate-600'
                                            }`}>
                                            <div className="font-semibold text-sm">{cat.label}</div>
                                            <div className="text-xs text-slate-400 mt-1">{cat.desc}</div>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="submit-glow rounded-lg">
                                <label className="block text-sm font-medium text-slate-300 mb-2">Short Description * <span className="text-slate-500">(one line)</span></label>
                                <input type="text" value={form.short_description} onChange={e => update('short_description', e.target.value)}
                                    placeholder="What does it do in one sentence?"
                                    maxLength={200}
                                    className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 transition" />
                                <div className="text-right text-xs text-slate-500 mt-1">{form.short_description.length}/200</div>
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-slate-300 mb-2">Long Description</label>
                                <textarea value={form.long_description} onChange={e => update('long_description', e.target.value)}
                                    placeholder="Detailed description — features, use cases, what makes it special..."
                                    rows={4}
                                    className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 transition resize-none" />
                            </div>
                        </div>
                    )}

                    {/* Step 2: Details */}
                    {step === 2 && (
                        <div className="space-y-6 fade-up">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label className="block text-sm font-medium text-slate-300 mb-2">Creator / Company</label>
                                    <input type="text" value={form.creator} onChange={e => update('creator', e.target.value)}
                                        placeholder="e.g. Anthropic, OpenAI"
                                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 transition" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-slate-300 mb-2">Website URL</label>
                                    <input type="url" value={form.website} onChange={e => update('website', e.target.value)}
                                        placeholder="https://..."
                                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 transition" />
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label className="block text-sm font-medium text-slate-300 mb-2">Logo URL</label>
                                    <input type="url" value={form.logo_url} onChange={e => update('logo_url', e.target.value)}
                                        placeholder="https://example.com/logo.png"
                                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 transition" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-slate-300 mb-2">Auth Type</label>
                                    <select value={form.auth_type} onChange={e => update('auth_type', e.target.value)}
                                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-cyan-500 transition">
                                        <option value="">Select...</option>
                                        {AUTH_TYPES.map(t => <option key={t} value={t}>{t.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase())}</option>)}
                                    </select>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label className="block text-sm font-medium text-slate-300 mb-2">API Base URL</label>
                                    <input type="url" value={form.api_base_url} onChange={e => update('api_base_url', e.target.value)}
                                        placeholder="https://api.example.com/v1"
                                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 transition" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-slate-300 mb-2">API Docs URL</label>
                                    <input type="url" value={form.api_docs_url} onChange={e => update('api_docs_url', e.target.value)}
                                        placeholder="https://docs.example.com"
                                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 transition" />
                                </div>
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-slate-300 mb-2">Capabilities <span className="text-slate-500">(comma separated)</span></label>
                                <input type="text" value={form.capabilities} onChange={e => update('capabilities', e.target.value)}
                                    placeholder="text generation, code completion, image analysis, ..."
                                    className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 transition" />
                                {form.capabilities && (
                                    <div className="flex flex-wrap gap-2 mt-2">
                                        {form.capabilities.split(',').map(s => s.trim()).filter(Boolean).map((cap, i) => (
                                            <span key={i} className="bg-cyan-900/50 text-cyan-300 text-xs px-3 py-1 rounded-full">{cap}</span>
                                        ))}
                                    </div>
                                )}
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-slate-300 mb-2">Tags <span className="text-slate-500">(comma separated)</span></label>
                                <input type="text" value={form.tags} onChange={e => update('tags', e.target.value)}
                                    placeholder="nlp, computer-vision, open-source, ..."
                                    className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 transition" />
                                {form.tags && (
                                    <div className="flex flex-wrap gap-2 mt-2">
                                        {form.tags.split(',').map(s => s.trim()).filter(Boolean).map((tag, i) => (
                                            <span key={i} className="bg-slate-700 text-slate-300 text-xs px-3 py-1 rounded-full">{tag}</span>
                                        ))}
                                    </div>
                                )}
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-slate-300 mb-3">Pricing</label>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-xs text-slate-400 mb-1">Free Tier</label>
                                        <input type="text" value={form.pricing_free_tier} onChange={e => update('pricing_free_tier', e.target.value)}
                                            placeholder="e.g. 1000 requests/month"
                                            className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 transition text-sm" />
                                    </div>
                                    <div>
                                        <label className="block text-xs text-slate-400 mb-1">Paid Plans</label>
                                        <input type="text" value={form.pricing_paid_plans} onChange={e => update('pricing_paid_plans', e.target.value)}
                                            placeholder="e.g. $20/mo Pro, $100/mo Enterprise"
                                            className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 transition text-sm" />
                                    </div>
                                </div>
                                <label className="flex items-center gap-3 mt-3 cursor-pointer">
                                    <input type="checkbox" checked={form.pricing_usage_based} onChange={e => update('pricing_usage_based', e.target.checked)}
                                        className="w-4 h-4 rounded border-slate-600 bg-slate-800 text-cyan-500 focus:ring-cyan-500" />
                                    <span className="text-sm text-slate-400">Usage-based pricing available</span>
                                </label>
                            </div>
                        </div>
                    )}

                    {/* Step 3: Review & Submit */}
                    {step === 3 && (
                        <div className="space-y-6 fade-up">
                            {/* Preview card */}
                            <div className="bg-slate-800 border border-slate-700 rounded-lg p-6">
                                <div className="flex items-start gap-4 mb-4">
                                    {form.logo_url ? (
                                        <img src={form.logo_url} alt="" className="w-12 h-12 rounded-lg object-cover bg-slate-700" onError={e => e.target.style.display='none'} />
                                    ) : (
                                        <div className="w-12 h-12 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center text-xl font-bold text-white">
                                            {form.name.charAt(0).toUpperCase()}
                                        </div>
                                    )}
                                    <div className="flex-1">
                                        <h3 className="text-xl font-bold text-cyan-400">{form.name || 'Agent Name'}</h3>
                                        {form.creator && <p className="text-sm text-slate-400">by {form.creator}</p>}
                                    </div>
                                    <span className="bg-cyan-900 text-cyan-200 text-xs px-3 py-1 rounded-full">
                                        {CATEGORIES.find(c => c.value === form.category)?.label || form.category}
                                    </span>
                                </div>
                                <p className="text-slate-300 mb-4">{form.short_description}</p>
                                {form.long_description && <p className="text-slate-400 text-sm mb-4">{form.long_description}</p>}
                                <div className="flex flex-wrap gap-2">
                                    {form.capabilities && form.capabilities.split(',').map(s => s.trim()).filter(Boolean).map((cap, i) => (
                                        <span key={i} className="bg-cyan-900/50 text-cyan-300 text-xs px-3 py-1 rounded-full">{cap}</span>
                                    ))}
                                    {form.tags && form.tags.split(',').map(s => s.trim()).filter(Boolean).map((tag, i) => (
                                        <span key={`t-${i}`} className="bg-slate-700 text-slate-300 text-xs px-3 py-1 rounded-full">{tag}</span>
                                    ))}
                                </div>
                                {(form.website || form.api_docs_url) && (
                                    <div className="flex gap-4 mt-4 pt-4 border-t border-slate-700">
                                        {form.website && <span className="text-sm text-slate-400">Website: <span className="text-cyan-400">{form.website}</span></span>}
                                        {form.api_docs_url && <span className="text-sm text-slate-400">Docs: <span className="text-cyan-400">{form.api_docs_url}</span></span>}
                                    </div>
                                )}
                            </div>

                            <p className="text-center text-sm text-slate-500">This is how your entry will appear in the directory.</p>

                            {/* Submitter info */}
                            <div className="bg-slate-900 border border-slate-800 rounded-lg p-6">
                                <h4 className="font-semibold mb-4 text-slate-200">Your Info <span className="text-xs text-slate-500">(not displayed publicly)</span></h4>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm text-slate-400 mb-1">Email *</label>
                                        <input type="email" value={form.submitter_email} onChange={e => update('submitter_email', e.target.value)}
                                            placeholder="you@example.com"
                                            className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 transition text-sm" />
                                    </div>
                                    <div>
                                        <label className="block text-sm text-slate-400 mb-1">Name</label>
                                        <input type="text" value={form.submitter_name} onChange={e => update('submitter_name', e.target.value)}
                                            placeholder="Your name"
                                            className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 transition text-sm" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Error */}
                    {error && (
                        <div className="mt-6 bg-red-500/10 border border-red-500/30 rounded-lg p-4 text-red-400 text-sm">
                            {error}
                        </div>
                    )}

                    {/* Navigation buttons */}
                    <div className="flex justify-between mt-10">
                        <button onClick={() => setStep(s => Math.max(1, s - 1))}
                            className={`px-6 py-3 rounded-lg font-semibold transition ${step === 1 ? 'invisible' : 'border border-slate-600 hover:border-slate-500 text-slate-300'}`}>
                            Back
                        </button>
                        {step < 3 ? (
                            <button onClick={() => setStep(s => s + 1)} disabled={!canAdvance()}
                                className={`px-8 py-3 rounded-lg font-semibold transition ${
                                    canAdvance()
                                        ? 'bg-cyan-500 hover:bg-cyan-400 text-slate-950'
                                        : 'bg-slate-700 text-slate-500 cursor-not-allowed'
                                }`}>
                                Continue
                            </button>
                        ) : (
                            <button onClick={handleSubmit} disabled={!canAdvance() || submitting}
                                className={`px-8 py-3 rounded-lg font-semibold transition flex items-center gap-2 ${
                                    canAdvance() && !submitting
                                        ? 'bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-400 hover:to-blue-400 text-white shadow-lg shadow-cyan-500/25'
                                        : 'bg-slate-700 text-slate-500 cursor-not-allowed'
                                }`}>
                                {submitting ? (
                                    <>
                                        <svg className="animate-spin w-5 h-5" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                                        Submitting...
                                    </>
                                ) : 'Submit to AgentPedia'}
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        function App() {
            return (
                <div>
                    <Nav />
                    <section className="py-16">
                        <div className="max-w-3xl mx-auto px-6">
                            <div className="text-center mb-12 fade-up">
                                <h1 className="text-4xl font-bold mb-4">Submit to AgentPedia</h1>
                                <p className="text-slate-400 text-lg">Add your AI agent, API, framework, or tool to the directory. Submissions are reviewed before publishing.</p>
                            </div>
                            <SubmitForm />
                        </div>
                    </section>
                    <footer className="border-t border-slate-800 py-8 text-center text-slate-500 text-sm">
                        <p>Copyright 2026 - 3xFreedom. Built with intent for agents, designed with humans in mind.</p>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
