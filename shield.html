<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AgentPedia Shield - Protect your website content from unauthorized AI agent crawling. Set terms of service for AI agents in minutes.">
  <title>AgentPedia Shield - AI Content Protection</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='24' font-size='24'>🛡️</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            shield: { 50: '#f0f0ff', 100: '#e0e0ff', 200: '#c4b5fd', 400: '#6c63ff', 500: '#5b54e6', 600: '#4a45c0', 900: '#13132b' },
            dark: { 800: '#1a1a2e', 900: '#0f0f23' }
          }
        }
      }
    };
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body class="bg-dark-900 text-gray-200 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;
    const SHIELD_API = "https://mcgnqvqswdjzoxauanzf.supabase.co/functions/v1/shield";

    const ShieldIcon = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="text-shield-400">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    );

    /* ───── Navigation ───── */
    function Nav({ siteDomain, onLogout }) {
      return (
        <nav className="bg-dark-800 border-b border-gray-800 px-6 py-4">
          <div className="max-w-6xl mx-auto flex items-center justify-between">
            <div className="flex items-center gap-3">
              <ShieldIcon />
              <a href="/shield" className="text-lg font-semibold text-white hover:text-shield-400 transition">AgentPedia Shield</a>
              {siteDomain && <span className="text-sm text-gray-500 ml-2">| {siteDomain}</span>}
            </div>
            <div className="flex items-center gap-4">
              <a href="/" className="text-sm text-gray-400 hover:text-white transition">AgentPedia Home</a>
              {onLogout && <button onClick={onLogout} className="text-sm text-gray-400 hover:text-red-400 transition">Log out</button>}
            </div>
          </div>
        </nav>
      );
    }

    /* ───── Setup / Auth Screen ───── */
    function SetupScreen({ onSetup, onLogin }) {
      const [tab, setTab] = useState("register");
      const [email, setEmail] = useState("");
      const [domain, setDomain] = useState("");
      const [siteName, setSiteName] = useState("");
      const [siteKey, setSiteKey] = useState("");
      const [siteSecret, setSiteSecret] = useState("");
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");

      async function handleRegister(e) {
        e.preventDefault();
        setLoading(true);
        setError("");
        try {
          const res = await fetch(SHIELD_API + "/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, site_domain: domain, site_name: siteName || domain }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "Registration failed");
          onSetup(data);
        } catch (err) {
          setError(err.message);
        }
        setLoading(false);
      }

      function handleLogin(e) {
        e.preventDefault();
        if (siteKey && siteSecret) onLogin(siteKey, siteSecret);
      }

      return (
        <div className="min-h-screen">
          <Nav />
          {/* Hero */}
          <div className="bg-gradient-to-br from-shield-600 via-shield-400 to-indigo-500 py-16 text-center">
            <div className="max-w-3xl mx-auto px-6">
              <ShieldIcon size={48} />
              <h1 className="text-4xl md:text-5xl font-bold text-white mt-4 mb-4">Protect Your Content from AI Agents</h1>
              <p className="text-lg text-indigo-100 mb-2">Set terms of service for AI crawlers in minutes. No coding required.</p>
            </div>
          </div>

          {/* How it works */}
          <div className="max-w-5xl mx-auto px-6 py-16">
            <h2 className="text-2xl font-bold text-white text-center mb-10">How It Works</h2>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16">
              <div className="text-center">
                <div className="w-12 h-12 rounded-full bg-shield-400 text-white text-xl font-bold flex items-center justify-center mx-auto mb-4">1</div>
                <h3 className="text-lg font-semibold text-white mb-2">Register Your Site</h3>
                <p className="text-gray-400 text-sm">Enter your domain and email. You get a site key and secret instantly.</p>
              </div>
              <div className="text-center">
                <div className="w-12 h-12 rounded-full bg-shield-400 text-white text-xl font-bold flex items-center justify-center mx-auto mb-4">2</div>
                <h3 className="text-lg font-semibold text-white mb-2">Add One Line of Code</h3>
                <p className="text-gray-400 text-sm">Copy-paste a single script tag into your website. That's it.</p>
              </div>
              <div className="text-center">
                <div className="w-12 h-12 rounded-full bg-shield-400 text-white text-xl font-bold flex items-center justify-center mx-auto mb-4">3</div>
                <h3 className="text-lg font-semibold text-white mb-2">AI Agents Must Agree</h3>
                <p className="text-gray-400 text-sm">Agents see your terms before crawling. Access is logged with watermarks.</p>
              </div>
            </div>

            {/* Register / Login form */}
            <div className="max-w-lg mx-auto">
              <div className="flex gap-2 mb-6">
                <button onClick={() => setTab("register")} className={`flex-1 py-2.5 rounded-lg text-sm font-medium transition ${tab === "register" ? "bg-shield-400 text-white" : "bg-dark-800 text-gray-400 hover:text-white"}`}>
                  Register New Site
                </button>
                <button onClick={() => setTab("login")} className={`flex-1 py-2.5 rounded-lg text-sm font-medium transition ${tab === "login" ? "bg-shield-400 text-white" : "bg-dark-800 text-gray-400 hover:text-white"}`}>
                  Existing Site Login
                </button>
              </div>

              {tab === "register" ? (
                <form onSubmit={handleRegister} className="bg-dark-800 rounded-xl p-6 space-y-4 border border-gray-800">
                  <div>
                    <label className="block text-sm text-gray-400 mb-1">Email</label>
                    <input type="email" value={email} onChange={e => setEmail(e.target.value)} required
                      className="w-full bg-dark-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:border-shield-400 focus:outline-none"
                      placeholder="you@example.com" />
                  </div>
                  <div>
                    <label className="block text-sm text-gray-400 mb-1">Your Website Domain</label>
                    <input type="text" value={domain} onChange={e => setDomain(e.target.value)} required
                      className="w-full bg-dark-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:border-shield-400 focus:outline-none"
                      placeholder="example.com" />
                  </div>
                  <div>
                    <label className="block text-sm text-gray-400 mb-1">Site Name (optional)</label>
                    <input type="text" value={siteName} onChange={e => setSiteName(e.target.value)}
                      className="w-full bg-dark-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:border-shield-400 focus:outline-none"
                      placeholder="My Awesome Blog" />
                  </div>
                  {error && <p className="text-red-400 text-sm">{error}</p>}
                  <button type="submit" disabled={loading}
                    className="w-full bg-shield-400 hover:bg-shield-500 text-white font-semibold py-3 rounded-lg transition disabled:opacity-50">
                    {loading ? "Registering..." : "Protect My Site (Free)"}
                  </button>
                </form>
              ) : (
                <form onSubmit={handleLogin} className="bg-dark-800 rounded-xl p-6 space-y-4 border border-gray-800">
                  <div>
                    <label className="block text-sm text-gray-400 mb-1">Site Key</label>
                    <input type="text" value={siteKey} onChange={e => setSiteKey(e.target.value)} required
                      className="w-full bg-dark-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white font-mono text-sm focus:border-shield-400 focus:outline-none"
                      placeholder="sk_..." />
                  </div>
                  <div>
                    <label className="block text-sm text-gray-400 mb-1">Site Secret</label>
                    <input type="password" value={siteSecret} onChange={e => setSiteSecret(e.target.value)} required
                      className="w-full bg-dark-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white font-mono text-sm focus:border-shield-400 focus:outline-none"
                      placeholder="ss_..." />
                  </div>
                  <button type="submit" className="w-full bg-shield-400 hover:bg-shield-500 text-white font-semibold py-3 rounded-lg transition">
                    View My Dashboard
                  </button>
                </form>
              )}
            </div>
          </div>

          {/* Footer */}
          <footer className="border-t border-gray-800 py-8 text-center text-gray-500 text-sm">
            Part of the <a href="/" className="text-shield-400 hover:underline">AgentPedia</a> ecosystem.
            Copyright 2026 - 3xFreedom.
          </footer>
        </div>
      );
    }

    /* ───── Onboarding (after registration) ───── */
    function OnboardingScreen({ data, onContinue }) {
      const [copied, setCopied] = useState("");

      function copy(text, label) {
        navigator.clipboard.writeText(text);
        setCopied(label);
        setTimeout(() => setCopied(""), 2000);
      }

      const snippetCode = `<script src="https://agentpedia.io/shield.js"
        data-site-key="${data.site_key}"
        data-mode="enforce">
<\/script>`;

      return (
        <div className="min-h-screen">
          <Nav />
          <div className="max-w-2xl mx-auto px-6 py-12">
            <div className="text-center mb-10">
              <div className="text-5xl mb-4">&#x2705;</div>
              <h2 className="text-3xl font-bold text-white mb-2">Your Site is Registered!</h2>
              <p className="text-gray-400 text-lg">{data.site_domain} is now protected by AgentPedia Shield</p>
            </div>

            <div className="space-y-6">
              {/* Credentials */}
              <div className="bg-dark-800 rounded-xl p-6 border border-gray-800">
                <h3 className="text-lg font-semibold text-white mb-2">Save Your Credentials</h3>
                <p className="text-gray-400 text-sm mb-4">You will need these to access your dashboard later. Store them somewhere safe.</p>
                <div className="space-y-3">
                  <div className="flex items-center justify-between bg-dark-900 rounded-lg px-4 py-3">
                    <div><span className="text-gray-400 text-sm">Site Key: </span><span className="font-mono text-shield-400 text-sm">{data.site_key}</span></div>
                    <button onClick={() => copy(data.site_key, "key")} className="text-xs bg-dark-800 text-gray-400 hover:text-white px-3 py-1 rounded border border-gray-700">
                      {copied === "key" ? "Copied!" : "Copy"}
                    </button>
                  </div>
                  <div className="flex items-center justify-between bg-dark-900 rounded-lg px-4 py-3">
                    <div><span className="text-gray-400 text-sm">Site Secret: </span><span className="font-mono text-shield-400 text-sm">{data.site_secret}</span></div>
                    <button onClick={() => copy(data.site_secret, "secret")} className="text-xs bg-dark-800 text-gray-400 hover:text-white px-3 py-1 rounded border border-gray-700">
                      {copied === "secret" ? "Copied!" : "Copy"}
                    </button>
                  </div>
                </div>
              </div>

              {/* Snippet */}
              <div className="bg-dark-800 rounded-xl p-6 border border-gray-800">
                <h3 className="text-lg font-semibold text-white mb-2">Add This to Your Website</h3>
                <p className="text-gray-400 text-sm mb-4">
                  Paste this single line into your HTML, just before the closing <code className="text-shield-200">&lt;/body&gt;</code> tag.
                  That's the only technical step — everything else is automatic.
                </p>
                <div className="relative">
                  <pre className="bg-dark-900 rounded-lg p-4 text-sm text-green-400 overflow-x-auto border border-gray-700">{snippetCode}</pre>
                  <button onClick={() => copy(snippetCode, "snippet")}
                    className="absolute top-2 right-2 text-xs bg-dark-800 text-gray-400 hover:text-white px-3 py-1 rounded border border-gray-700">
                    {copied === "snippet" ? "Copied!" : "Copy Code"}
                  </button>
                </div>
              </div>

              {/* What happens next */}
              <div className="bg-dark-800 rounded-xl p-6 border border-gray-800">
                <h3 className="text-lg font-semibold text-white mb-3">What Happens Next?</h3>
                <div className="space-y-3 text-sm text-gray-400">
                  <div className="flex gap-3">
                    <span className="text-shield-400 font-bold">1.</span>
                    <span>When an AI agent visits your site, Shield detects it automatically.</span>
                  </div>
                  <div className="flex gap-3">
                    <span className="text-shield-400 font-bold">2.</span>
                    <span>The agent is shown your terms of service and must agree before accessing content.</span>
                  </div>
                  <div className="flex gap-3">
                    <span className="text-shield-400 font-bold">3.</span>
                    <span>Every access is logged with a unique watermark for attribution tracking.</span>
                  </div>
                  <div className="flex gap-3">
                    <span className="text-shield-400 font-bold">4.</span>
                    <span>You can monitor everything from your dashboard.</span>
                  </div>
                </div>
              </div>

              <button onClick={() => onContinue(data.site_key, data.site_secret)}
                className="w-full bg-shield-400 hover:bg-shield-500 text-white font-semibold py-3.5 rounded-lg transition text-lg">
                Go to My Dashboard
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ───── Dashboard ───── */
    function Dashboard({ siteKey, siteSecret, onLogout }) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [activeTab, setActiveTab] = useState("overview");
      const [copied, setCopied] = useState("");

      function copy(text, label) {
        navigator.clipboard.writeText(text);
        setCopied(label);
        setTimeout(() => setCopied(""), 2000);
      }

      const fetchDashboard = useCallback(async () => {
        try {
          const res = await fetch(SHIELD_API + "/dashboard", {
            headers: { "x-site-key": siteKey, "x-site-secret": siteSecret },
          });
          if (!res.ok) throw new Error("Failed to load dashboard");
          const d = await res.json();
          setData(d);
        } catch (err) {
          console.error(err);
        }
        setLoading(false);
      }, [siteKey, siteSecret]);

      useEffect(() => { fetchDashboard(); }, [fetchDashboard]);

      if (loading) {
        return (
          <div className="min-h-screen">
            <Nav />
            <div className="flex items-center justify-center py-32">
              <div className="text-gray-400 text-lg">Loading your dashboard...</div>
            </div>
          </div>
        );
      }

      if (!data) {
        return (
          <div className="min-h-screen">
            <Nav onLogout={onLogout} />
            <div className="flex flex-col items-center justify-center py-32 gap-4">
              <div className="text-red-400 text-lg">Could not load dashboard. Check your credentials.</div>
              <button onClick={onLogout} className="bg-dark-800 text-gray-300 px-6 py-2 rounded-lg hover:bg-dark-800/80">Try Again</button>
            </div>
          </div>
        );
      }

      const snippetCode = `<script src="https://agentpedia.io/shield.js"
        data-site-key="${siteKey}"
        data-mode="enforce">
<\/script>`;

      const tabs = [
        { id: "overview", label: "Overview" },
        { id: "access", label: "Access Log" },
        { id: "setup", label: "Setup Code" },
      ];

      return (
        <div className="min-h-screen">
          <Nav siteDomain={data.site_domain} onLogout={onLogout} />
          <div className="max-w-6xl mx-auto px-6 py-8">
            {/* Stats */}
            <div className="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8">
              <div className="bg-dark-800 rounded-xl p-5 border border-gray-800">
                <div className="text-3xl font-bold text-white">{data.recent_access_logs_count || 0}</div>
                <div className="text-sm text-gray-400 mt-1">Requests (7 days)</div>
              </div>
              <div className="bg-dark-800 rounded-xl p-5 border border-gray-800">
                <div className="text-3xl font-bold text-shield-400">{data.total_agreements || 0}</div>
                <div className="text-sm text-gray-400 mt-1">Active Agreements</div>
              </div>
              <div className="bg-dark-800 rounded-xl p-5 border border-gray-800 col-span-2 md:col-span-1">
                <div className="text-3xl font-bold text-green-400">{data.site_name}</div>
                <div className="text-sm text-gray-400 mt-1">{data.site_domain}</div>
              </div>
            </div>

            {/* Tabs */}
            <div className="flex gap-1 mb-6 bg-dark-800 rounded-lg p-1 border border-gray-800">
              {tabs.map(t => (
                <button key={t.id} onClick={() => setActiveTab(t.id)}
                  className={`px-5 py-2.5 rounded-md text-sm font-medium transition ${activeTab === t.id ? "bg-shield-400 text-white" : "text-gray-400 hover:text-white"}`}>
                  {t.label}
                </button>
              ))}
            </div>

            {/* Overview */}
            {activeTab === "overview" && (
              <div className="bg-dark-800 rounded-xl p-6 border border-gray-800">
                <h3 className="text-lg font-semibold text-white mb-4">Recent Agent Activity</h3>
                {(data.recent_access_logs || []).length === 0 ? (
                  <div className="text-center py-12">
                    <div className="text-4xl mb-3">&#x1F6E1;&#xFE0F;</div>
                    <p className="text-gray-400">No agent activity yet.</p>
                    <p className="text-gray-500 text-sm mt-1">Once AI agents visit your site, their access attempts will appear here.</p>
                  </div>
                ) : (
                  <div className="space-y-2">
                    {(data.recent_access_logs || []).map((a, i) => (
                      <div key={i} className="flex items-center justify-between bg-dark-900 rounded-lg px-4 py-3 text-sm">
                        <div className="flex items-center gap-3">
                          <span className={`w-2.5 h-2.5 rounded-full ${a.access_granted ? "bg-green-400" : "bg-red-400"}`} />
                          <span className="text-gray-300 font-mono text-xs">{a.request_path}</span>
                        </div>
                        <div className="flex items-center gap-3">
                          <span className={`text-xs px-2 py-0.5 rounded ${a.access_granted ? "bg-green-900 text-green-300" : "bg-red-900 text-red-300"}`}>
                            {a.access_granted ? "Granted" : "Denied"}
                          </span>
                          <span className="text-gray-500 text-xs">{new Date(a.accessed_at).toLocaleString()}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* Access Log */}
            {activeTab === "access" && (
              <div className="bg-dark-800 rounded-xl p-6 border border-gray-800">
                <h3 className="text-lg font-semibold text-white mb-4">Full Access Log</h3>
                {(data.recent_access_logs || []).length === 0 ? (
                  <p className="text-gray-400 text-sm py-8 text-center">No access logs yet.</p>
                ) : (
                  <div className="space-y-2">
                    {(data.recent_access_logs || []).map((a, i) => (
                      <div key={i} className="flex items-center justify-between bg-dark-900 rounded-lg px-4 py-3 text-sm">
                        <div className="flex items-center gap-3">
                          <span className={`w-2.5 h-2.5 rounded-full ${a.access_granted ? "bg-green-400" : "bg-red-400"}`} />
                          <span className="text-white">{a.request_path}</span>
                        </div>
                        <span className="text-gray-500 text-xs">{new Date(a.accessed_at).toLocaleString()}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* Setup */}
            {activeTab === "setup" && (
              <div className="space-y-6">
                <div className="bg-dark-800 rounded-xl p-6 border border-gray-800">
                  <h3 className="text-lg font-semibold text-white mb-2">Your Site Key</h3>
                  <div className="flex items-center justify-between bg-dark-900 rounded-lg px-4 py-3">
                    <code className="text-shield-400 text-sm font-mono">{siteKey}</code>
                    <button onClick={() => copy(siteKey, "key")} className="text-xs text-gray-400 hover:text-white px-3 py-1 rounded border border-gray-700">
                      {copied === "key" ? "Copied!" : "Copy"}
                    </button>
                  </div>
                </div>
                <div className="bg-dark-800 rounded-xl p-6 border border-gray-800">
                  <h3 className="text-lg font-semibold text-white mb-2">Embed Snippet</h3>
                  <p className="text-gray-400 text-sm mb-4">Add this to your site's HTML, just before the closing &lt;/body&gt; tag:</p>
                  <div className="relative">
                    <pre className="bg-dark-900 rounded-lg p-4 text-sm text-green-400 overflow-x-auto border border-gray-700">{snippetCode}</pre>
                    <button onClick={() => copy(snippetCode, "snippet")}
                      className="absolute top-2 right-2 text-xs bg-dark-800 text-gray-400 hover:text-white px-3 py-1 rounded border border-gray-700">
                      {copied === "snippet" ? "Copied!" : "Copy Code"}
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ───── App Root ───── */
    function App() {
      const [screen, setScreen] = useState("setup");
      const [onboardData, setOnboardData] = useState(null);
      const [creds, setCreds] = useState({ key: "", secret: "" });

      // Check for saved creds in URL hash
      useEffect(() => {
        const hash = window.location.hash;
        if (hash.startsWith("#dashboard:")) {
          const parts = hash.substring(11).split(":");
          if (parts.length === 2) {
            setCreds({ key: parts[0], secret: parts[1] });
            setScreen("dashboard");
          }
        }
      }, []);

      function handleSetup(data) {
        setOnboardData(data);
        setScreen("onboarding");
      }

      function handleLogin(key, secret) {
        setCreds({ key, secret });
        setScreen("dashboard");
      }

      function handleLogout() {
        setCreds({ key: "", secret: "" });
        setScreen("setup");
        window.location.hash = "";
      }

      if (screen === "setup") return <SetupScreen onSetup={handleSetup} onLogin={handleLogin} />;
      if (screen === "onboarding") return <OnboardingScreen data={onboardData} onContinue={handleLogin} />;
      return <Dashboard siteKey={creds.key} siteSecret={creds.secret} onLogout={handleLogout} />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
